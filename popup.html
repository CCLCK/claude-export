<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <style>
    :root {
      color-scheme: light;
      --paper: #faf7f1;
      --panel: rgba(255, 252, 246, 0.94);
      --panel-strong: #fffdf9;
      --border: #e7ddcf;
      --border-strong: #d8c6ac;
      --text: #3f3a33;
      --muted: #7a6d5a;
      --accent: #a36422;
      --accent-strong: #8f5417;
      --accent-soft: #f6e9d0;
      --success: #2f7a4c;
      --error: #b8504c;
      --shadow: 0 18px 40px rgba(114, 91, 56, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      width: 284px;
      margin: 0;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(246, 233, 208, 0.68), transparent 54%),
        linear-gradient(180deg, #fdfbf6 0%, #f7f1e7 100%);
      color: var(--text);
    }
    .panel {
      position: relative;
      overflow: hidden;
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, var(--panel) 0%, rgba(255, 249, 240, 0.98) 100%);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .panel::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, #d48a30 0%, #f0d39a 55%, rgba(240, 211, 154, 0) 100%);
    }
    .eyebrow {
      margin: 0 0 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--accent);
      text-transform: uppercase;
    }
    h2 {
      margin: 0 0 6px;
      font-size: 17px;
      line-height: 1.3;
      color: var(--text);
    }
    .subhead {
      margin: 0 0 14px;
      font-size: 12px;
      line-height: 1.55;
      color: var(--muted);
    }
    button {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      background: linear-gradient(180deg, #b57229 0%, #9c5d1f 100%);
      color: #fffaf2;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      box-shadow: 0 10px 20px rgba(156, 93, 31, 0.2);
    }
    button:hover {
      background: linear-gradient(180deg, #bf7a2d 0%, #a76422 100%);
      transform: translateY(-1px);
      box-shadow: 0 14px 24px rgba(156, 93, 31, 0.24);
    }
    button:disabled {
      background: linear-gradient(180deg, #c9baa7 0%, #b4a28c 100%);
      border-color: #c8baa8;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary {
      margin-top: 8px;
      background: linear-gradient(180deg, #f5ece0 0%, #ecdece 100%);
      color: var(--accent-strong);
      border-color: var(--border);
      box-shadow: 0 4px 10px rgba(156, 93, 31, 0.08);
      font-weight: 600;
    }
    .btn-secondary:hover {
      background: linear-gradient(180deg, #faefe1 0%, #f0dfc8 100%);
      color: var(--accent-strong);
      box-shadow: 0 6px 14px rgba(156, 93, 31, 0.12);
    }
    .btn-ghost {
      margin-top: 8px;
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
      box-shadow: none;
      font-weight: 600;
    }
    .btn-ghost:hover {
      background: rgba(255, 249, 240, 0.72);
      color: var(--text);
      box-shadow: none;
      transform: none;
    }
    .options {
      margin: 0 0 14px;
      padding: 12px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255, 252, 247, 0.96) 0%, rgba(248, 242, 232, 0.96) 100%);
      border: 1px solid var(--border);
    }
    .option-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 12px;
      color: var(--text);
      line-height: 1.5;
    }
    .option-row input {
      margin: 2px 0 0;
      accent-color: var(--accent);
    }
    .option-row--stack {
      display: block;
    }
    .option-row--stack label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--text);
      font-weight: 600;
    }
    .option-row--stack select {
      width: 100%;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-strong);
      color: var(--text);
      font-size: 12px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    .option-row--stack select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(163, 100, 34, 0.14);
    }
    .option-meta {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      color: var(--muted);
    }
    #status {
      margin-top: 11px;
      min-height: 18px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      white-space: normal;
      line-height: 1.45;
    }
    #status.error  { color: var(--error); }
    #status.success { color: var(--success); }
    .select-mode-hint {
      display: none;
      margin-top: 10px;
      padding: 9px 12px;
      border-radius: 10px;
      background: #fdf6e3;
      border: 1px solid #e8d5a3;
      font-size: 12px;
      color: #7c4f10;
      text-align: center;
      line-height: 1.5;
    }
    .select-mode-hint.visible { display: block; }
    #cancelSelectPageBtn {
      display: none;
      margin-top: 8px;
      background: linear-gradient(180deg, #f0e8d8 0%, #e2d4bc 100%);
      color: var(--muted);
      border-color: var(--border);
      box-shadow: none;
      font-size: 13px;
    }
    #cancelSelectPageBtn:hover {
      background: linear-gradient(180deg, #f5ece0 0%, #e8d8c0 100%);
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="panel">
    <p class="eyebrow">Claude Export</p>
    <h2>离线导出面板</h2>
    <p class="subhead">导出成和阅读页同风格的 HTML，保留控件、附件和论文友好的图片清晰度。</p>
    <div class="options">
      <label class="option-row" for="includeThinking">
        <input id="includeThinking" type="checkbox"/>
        <span>包含思维链
          <span class="option-meta">默认关闭。只在你明确想保留 thinking block 时再勾选。</span>
        </span>
      </label>
      <label class="option-row" for="enableRename" style="margin-top: 10px;">
        <input id="enableRename" type="checkbox"/>
        <span>导出时重命名文件
          <span class="option-meta">勾选后每次导出前弹出输入框，方便按主题命名。</span>
        </span>
      </label>
      <div class="option-row option-row--stack" style="margin-top: 12px;">
        <label for="widgetImagePreset">控件图片导出清晰度</label>
        <select id="widgetImagePreset">
          <option value="2x">2x 屏幕高清</option>
          <option value="300dpi" selected>300 DPI（默认）</option>
          <option value="600dpi">600 DPI（论文打印）</option>
        </select>
        <span class="option-meta">默认按 300 DPI 导出控件图片；600 DPI 适合直接放进论文。</span>
      </div>
    </div>
    <button id="exportBtn">导出为完全离线 HTML</button>
    <button id="selectMsgBtn" class="btn-secondary">选择消息导出…</button>
    <button id="openDebugLogBtn" class="btn-ghost" type="button">查看调试日志</button>
    <div class="select-mode-hint" id="selectModeHint">
      📌 页面已进入选择模式<br>在对话页面勾选消息后，点击底部「导出选中」按钮
    </div>
    <button id="cancelSelectPageBtn" type="button">退出选择模式</button>
    <div id="status"></div>
  </div>
  <script src="popup-core.js"></script>
  <script src="popup-selection.js"></script>
  <script src="popup-export-builder.js"></script>
  <script src="popup-ui.js"></script>
</body>
</html>
