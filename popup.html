<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <style>
    body {
      width: 240px; padding: 16px; margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e; color: #e0e0e0;
    }
    h2 { font-size: 14px; margin: 0 0 12px; color: #c084fc; }
    button {
      width: 100%; padding: 10px; background: #7c3aed; color: white;
      border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #6d28d9; }
    button:disabled { background: #4b4b6b; cursor: not-allowed; }
    #status {
      margin-top: 10px; font-size: 12px; color: #a0a0c0;
      text-align: center; min-height: 18px;
    }
    #status.error  { color: #f87171; }
    #status.success { color: #4ade80; }
  </style>
</head>
<body>
  <h2>📄 Claude 聊天导出（离线版）</h2>
  <button id="exportBtn">导出为完全离线 HTML</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
