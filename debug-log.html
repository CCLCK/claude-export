<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Claude Export 调试日志</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #faf7f1;
      --panel: #fffdf9;
      --border: #e7ddcf;
      --text: #3f3a33;
      --muted: #7a6d5a;
      --accent: #a36422;
      --danger: #b8504c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(246, 233, 208, 0.68), transparent 50%),
        linear-gradient(180deg, #fdfbf6 0%, #f7f1e7 100%);
      color: var(--text);
    }
    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255, 252, 246, 0.95);
      box-shadow: 0 18px 40px rgba(114, 91, 56, 0.12);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.6;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fffaf2;
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
    }
    button.primary {
      background: linear-gradient(180deg, #b57229 0%, #9c5d1f 100%);
      border-color: #c58b4b;
      color: #fffaf2;
    }
    button.danger {
      color: var(--danger);
    }
    #meta {
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    #logList {
      display: grid;
      gap: 10px;
    }
    .entry {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--panel);
    }
    .entry-head {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 78px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #f6e9d0;
      color: var(--accent);
      font-weight: 700;
    }
    .time {
      color: var(--muted);
    }
    .event {
      font-weight: 700;
    }
    pre {
      margin: 0;
      padding: 10px 12px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--border);
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      font-size: 12px;
    }
    .empty {
      padding: 20px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.55);
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Claude Export 调试日志</h1>
    <p>这是临时调试页。妈给你把扩展侧、页面注入侧、后台 runner 的关键节点都记在这里了，后面定位问题别再盲猜。</p>
    <div class="toolbar">
      <button id="refreshBtn" class="primary" type="button">刷新日志</button>
      <button id="clearBtn" class="danger" type="button">清空日志</button>
    </div>
    <div id="meta"></div>
    <div id="logList"></div>
  </div>
  <script src="debug-log.js"></script>
</body>
</html>
